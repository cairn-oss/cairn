name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy (strict)
        run: mypy

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.10"
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Tests with coverage
        run: pytest tests/ --cov=cairn --cov-fail-under=90
      - name: Self-scan smoke test (exit-code contract)
        shell: bash
        run: |
          cairn scan examples/clean
          if cairn scan examples/vulnerable --quiet; then
            echo "expected exit 1 on vulnerable fixture" && exit 1
          fi
          cairn scan examples/vulnerable --fail-on NEVER --format sarif --output s.sarif
          python -c "import json; json.load(open('s.sarif'))"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e . pip-audit
      - name: Dependency audit
        run: pip-audit

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Rule docs are up to date
        run: |
          python scripts/generate_rules_doc.py
          git diff --exit-code docs/rules.md
