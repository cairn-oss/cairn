name: Release

on:
  push:
    tags: ["v*.*.*"]   # semver only; the moving v0 tag must not trigger a release

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Verify tag matches package version
        run: |
          pip install -e .
          PKG=$(python -c "import cairn; print(cairn.__version__)")
          TAG="${GITHUB_REF_NAME#v}"
          [ "$PKG" = "$TAG" ] || { echo "tag $TAG != package $PKG"; exit 1; }
      - run: python -m build
      - name: Generate CycloneDX SBOM of the release artifact
        run: |
          python -m pip install cyclonedx-bom
          python -m venv /tmp/relenv
          /tmp/relenv/bin/pip install --quiet dist/*.whl
          mkdir -p sbom
          cyclonedx-py environment /tmp/relenv/bin/python > "sbom/cairn-${GITHUB_REF_NAME}.cyclonedx.json"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      - name: GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            sbom/*
          generate_release_notes: true
