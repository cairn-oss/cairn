name: Release

on:
  push:
    tags: ["v*.*.*"]   # semver only; the moving v0 tag must not trigger a release

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Verify tag matches package version
        run: |
          pip install -e .
          PKG=$(python -c "import cairn; print(cairn.__version__)")
          TAG="${GITHUB_REF_NAME#v}"
          [ "$PKG" = "$TAG" ] || { echo "tag $TAG != package $PKG"; exit 1; }
      - run: python -m build
      - name: Generate CycloneDX SBOM of the release artifact
        run: |
          python -m pip install cyclonedx-bom
          python -m venv /tmp/relenv
          /tmp/relenv/bin/pip install --quiet dist/*.whl
          mkdir -p sbom
          cyclonedx-py environment /tmp/relenv/bin/python > "sbom/cairn-${GITHUB_REF_NAME}.cyclonedx.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: sbom
          path: sbom/
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4
        with:
          subject-path: dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          skip-existing: true
      - name: GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          files: |
            dist/*
            sbom/*
          generate_release_notes: true
